name: python-greetings

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  install-pip-deps:
    runs-on: self-hosted
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6
      - name: Start install-pip-deps stage
        run: echo "Installing all required dependencies.."
      - name: Install Python dependencies
        uses: ./.github/actions/install-pip-deps

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6
      - name: Start deploy-to-dev stage
        run: echo "Deployment to dev has started.."
      - name: Deploy to dev
        uses: ./.github/actions/deploy
        with:
          env_name: dev
          port: "7001"

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6
      - name: Start tests-on-dev stage
        run: echo "Testing Greetings API on dev has started.."
      - name: Run tests on dev
        uses: ./.github/actions/test
        with:
          env_name: dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6
      - name: Start deploy-to-stg stage
        run: echo "Deployment to stg has started.."
      - name: Deploy to stg
        uses: ./.github/actions/deploy
        with:
          env_name: stg
          port: "7002"

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6
      - name: Start tests-on-stg stage
        run: echo "Testing Greetings API on stg has started.."
      - name: Run tests on stg
        uses: ./.github/actions/test
        with:
          env_name: stg

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6
      - name: Start deploy-to-preprod stage
        run: echo "Deployment to preprod has started.."
      - name: Deploy to preprod
        uses: ./.github/actions/deploy
        with:
          env_name: preprod
          port: "7003"

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6
      - name: Start tests-on-preprod stage
        run: echo "Testing Greetings API on preprod has started.."
      - name: Run tests on preprod
        uses: ./.github/actions/test
        with:
          env_name: preprod

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6
      - name: Start deploy-to-prod stage
        run: echo "Deployment to prod has started.."
      - name: Deploy to prod
        uses: ./.github/actions/deploy
        with:
          env_name: prod
          port: "7004"

  tests-on-prod:
    name: Tests-on-prod
    runs-on: self-hosted
    needs: deploy-to-prod
    steps:
      - name: Checkout pipeline repository
        uses: actions/checkout@v6
      - name: Start tests-on-prod stage
        run: echo "Testing Greetings API on prod has started.."
      - name: Run tests on prod
        uses: ./.github/actions/test
        with:
          env_name: prod
